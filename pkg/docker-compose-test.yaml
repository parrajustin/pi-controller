version: '3.8'
services:
  kiosk_debug:
    build:
      context: ./kiosk_debug
    container_name: kiosk_debug
    privileged: true
    shm_size: 2g
    ports:
      - "5050:5050"
      - "9222:9223"
      - "5900:5900"
    volumes:
      - "./kiosk_debug/chrome-data:/chrome-data"
    restart: always

  lounge_display:
    build:
      context: ./lounge_display
      additional_contexts:
        token_receiver: ./token_receiver
        standard_ts_lib: ../../standard-ts-lib
    container_name: lounge_display
    ports:
      - "8080:8080"
    environment:
      - SKIP_SETUP=${SKIP_SETUP:-false}
      - HOST_IP=${HOST_IP}
      - KIOSK_IP=kiosk_debug
      - CDP_PORT=9223
      - TOKEN_ENCRYPTION_KEY=default_local_dev_key_change_me_in_prod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    volumes:
      - "./lounge_display/oauth_test:/oauth"
      - "./lounge_display/logs:/app/logs"
    depends_on:
      - kiosk_debug

  token-receiver:
    image: xerofuzzion/lounge_display_token_reciever:latest-x86_64
    ports:
      - "7070:7070"
    environment:
      - SERVER_ADDR=0.0.0.0:7070
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC ingest
    environment:
      - PROMETHEUS_EXTRA_ARGS=--storage.tsdb.retention.time=60d
    volumes:
      - ./lgtm/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
      - ./lgtm/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"   # OTLP http for frontend telemetry
    depends_on:
      - lgtm
      - node_exporter
